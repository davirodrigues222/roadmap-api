<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roadmap Dev — Davi</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ─── LAYOUT PRINCIPAL ─── -->
<div class="app-layout" id="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <!-- Brand -->
      <div class="sidebar-brand">
        <span class="brand-icon">⚡</span>
        <div>
          <div class="brand-name">Roadmap Dev</div>
          <div class="brand-sub">Davi Rodrigues</div>
        </div>
      </div>

      <!-- Streak badge -->
      <div class="sidebar-streak" id="sidebar-streak">
        <span class="streak-fire">🔥</span>
        <span class="streak-num" id="streak-num">0</span>
        <span class="streak-label">dias seguidos</span>
      </div>

      <!-- Nav items -->
      <nav class="sidebar-nav" id="sidebar-nav">
        <a class="nav-item" data-view="dashboard" onclick="Router.navigate('dashboard',{})">
          <span class="nav-icon">📊</span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a class="nav-item" data-view="roadmap" onclick="Router.navigate('roadmap',{ns:'jr'})">
          <span class="nav-icon">🗺️</span>
          <span class="nav-label">Roadmap</span>
        </a>
        <a class="nav-item" data-view="exercises" onclick="Router.navigate('exercises',{})">
          <span class="nav-icon">💪</span>
          <span class="nav-label">Exercícios</span>
        </a>
        <a class="nav-item" data-view="reviews" onclick="Router.navigate('reviews',{})">
          <span class="nav-icon">🔁</span>
          <span class="nav-label">Revisões</span>
          <span class="nav-badge" id="review-badge" style="display:none">0</span>
        </a>
        <a class="nav-item" data-view="notes" onclick="Router.navigate('notes',{})">
          <span class="nav-icon">📝</span>
          <span class="nav-label">Anotações</span>
        </a>
        <a class="nav-item" data-view="stats" onclick="Router.navigate('stats',{})">
          <span class="nav-icon">📈</span>
          <span class="nav-label">Estatísticas</span>
        </a>
        <a class="nav-item" data-view="projects" onclick="Router.navigate('projects',{})">
          <span class="nav-icon">🛠️</span>
          <span class="nav-label">Projetos</span>
        </a>
      </nav>

      <!-- XP Bar -->
      <div class="sidebar-xp" id="sidebar-xp">
        <div class="xp-level-row">
          <span class="xp-rank" id="xp-rank">iniciante</span>
          <span class="xp-val" id="xp-val">0 XP</span>
        </div>
        <div class="xp-track">
          <div class="xp-fill" id="xp-fill" style="width:0%"></div>
        </div>
        <div class="xp-next" id="xp-next">próximo: 200 XP</div>
      </div>
    </div>

    <!-- Hamburger (mobile) -->
    <button class="sidebar-close" onclick="document.getElementById('app-layout').classList.remove('sidebar-open')">✕</button>
  </aside>

  <!-- OVERLAY (mobile) -->
  <div class="sidebar-overlay" onclick="document.getElementById('app-layout').classList.remove('sidebar-open')"></div>

  <!-- CONTEÚDO PRINCIPAL -->
  <div class="main-wrapper">
    <!-- Mobile topbar -->
    <div class="mobile-topbar">
      <button class="hamburger" onclick="document.getElementById('app-layout').classList.toggle('sidebar-open')">☰</button>
      <span class="mobile-title">Roadmap Dev</span>
      <span></span>
    </div>

    <main id="main-content" class="main-content">
      <!-- Conteúdo renderizado dinamicamente pelas views -->
      <div class="loading-init">
        <div class="loading-spinner"></div>
        <p>Carregando...</p>
      </div>
    </main>
  </div>
</div>

<!-- ─── SCRIPTS: core (ordem importa) ─── -->
<script src="core/events.js"></script>
<script src="core/store.js"></script>
<script src="core/sync.js"></script>
<script src="core/router.js"></script>

<!-- ─── SCRIPTS: data (combinados em JR_DATA e ADS_DATA) ─── -->
<script src="data/jr-base.js"></script>
<script src="data/jr-fundamentos.js"></script>
<script src="data/jr-frontend.js"></script>
<script src="data/jr-backend.js"></script>
<script src="data/ads-estrutura.js"></script>
<script src="data/ads-web.js"></script>
<script src="data/ads-mysql.js"></script>
<script src="data/ads-java.js"></script>
<script src="data/ads-arq.js"></script>
<script src="data/ads-bootcamp.js"></script>
<script src="data/ads-vendy.js"></script>

<!-- ─── SCRIPTS: components ─── -->
<script src="components/sidebar.js"></script>
<script src="components/achievements.js"></script>
<script src="components/timer.js"></script>

<!-- ─── SCRIPTS: views ─── -->
<script src="views/dashboard.js"></script>
<script src="views/roadmap.js"></script>
<script src="views/topic.js"></script>
<script src="views/exercises.js"></script>
<script src="views/notes.js"></script>
<script src="views/stats.js"></script>
<script src="views/reviews.js"></script>
<script src="views/projects.js"></script>

<!-- ─── API CONFIG ─── -->
<!-- Após deploy no Railway, cole a URL pública do seu serviço aqui -->
<script>
  const API_URL = 'https://roadmap-api-h6xn.onrender.com';
</script>

<!-- ─── INIT ─── -->
<script>
  // Combinar dados das trilhas
  const JR_DATA  = [...JR_BASE, ...JR_FUNDAMENTOS, ...JR_FRONTEND, ...JR_BACKEND];
  const ADS_DATA = [...ADS_ESTRUTURA, ...ADS_WEB, ...ADS_MYSQL, ...ADS_JAVA, ...ADS_ARQ, ...ADS_BOOTCAMP, ...ADS_VENDY];

  // Registrar rotas
  Router.register('dashboard', (p) => DashboardView.render(p));
  Router.register('roadmap',   (p) => RoadmapView.render(p));
  Router.register('topic',     (p) => TopicView.render(p));
  Router.register('exercises', (p) => ExercisesView.render(p));
  Router.register('notes',     (p) => NotesView.render(p));
  Router.register('stats',     (p) => StatsView.render(p));
  Router.register('reviews',   (p) => ReviewsView.render(p));
  Router.register('projects',  (p) => ProjectsView.render(p));

  // Inicializar — async para aguardar sync com Supabase antes de renderizar
  (async function () {
    Store.load();
    Store.updateStreak();
    await Sync.init(API_URL); // puxa dados da nuvem
    Sidebar.render();
    Achievements.init();
    Router.init();
  })();
</script>

<!-- Toast container (achievements/level-up) -->
<div id="toast-container"></div>

</body>
</html>
